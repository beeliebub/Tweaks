name: Tweaks
version: '$version'

main: me.beeliebub.tweaks.Tweaks
api-version: '26.1.1'
load: POSTWORLD

commands:
  home:
    description: Teleport to a saved home.
  sethome:
    description: Set a home at your current location.
  delhome:
    description: Delete a saved home.
  homes:
    description: List all your saved homes.
  warp:
    description: Teleport to a warp.
  setwarp:
    description: Set a warp.
  delwarp:
    description: Delete a warp.
  warps:
    description: List all warps.
  spawn:
    description: Teleport to the world spawn.
  nv:
    description: Toggle night vision.