name: Tweaks
version: '$version'

main: me.beeliebub.tweaks.Tweaks
api-version: '26.1.1'
load: POSTWORLD

commands:
  home:
    description: Teleport to a saved home.
  sethome:
    description: Set a home at your current location.
  delhome:
    description: Delete a saved home.
  homes:
    description: List all your saved homes.
  warp:
    description: Teleport to a warp.
  setwarp:
    description: Set a warp.
  delwarp:
    description: Delete a warp.
  warps:
    description: List all warps.
  spawn:
    description: Teleport to the world spawn.
  nv:
    description: Toggle night vision.
  tconfig:
    description: Update plugin config options.
    usage: |
      /tconfig max_homes <int>
      /tconfig egg_collector_drop_chance <0.0-100.0>
      /tconfig eggdrop <disable|enable> <mob>
      /tconfig spawneregg <disable|enable> <mob>
    aliases: [tweaksconfig]
  nick:
    description: Set or remove your nickname
  tpa:
    description: Request to teleport to a player
  tpahere:
    description: Request a player to teleport to you
  tpaccept:
    description: Accept an incoming TPA request
  tpdeny:
    description: Deny an incoming TPA request
  back:
    description: Return to your previous location
  fly:
    description: Toggle flight mode
  reward:
    description: Manage and claim minigame rewards
  whack:
    description: Whack an Andrew minigame admin commands
  more:
    description: Maximize the stack size of the held item
  bloodmoon:
    description: Force the next full moon to be a Blood Moon (admin).
    usage: /bloodmoon
  fullmoon:
    description: Show roughly how long until the next full moon.
    usage: /fullmoon
  itemfilter:
    description: Configure your personal item pickup filter (whitelist or blacklist mode).
    usage: /itemfilter [toggle | mode | add <item> | remove <item> | list]
    aliases: [if]
  toolprotect:
    description: Block use of low-durability epic/legendary diamond/netherite tools (default ON).
    usage: /toolprotect <on|off> | /toolprotect durability <n>
  afk:
    description: Toggle AFK status. AFK players don't count toward sleep skipping.
    usage: /afk
  invsee:
    description: View and modify another online player's inventory (admin).
    usage: /invsee <player>
  resource:
    description: Safely teleport to the resource world
  help:
    description: Comprehensive GUI help menu.
    usage: /help [section]